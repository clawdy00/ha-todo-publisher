name: ci

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  image:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        run: echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build image
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/ha-todo-publisher"
          docker build -t "$IMAGE:${GITHUB_SHA}" -t "$IMAGE:latest" .
      - name: Push image
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/ha-todo-publisher"
          docker push "$IMAGE:${GITHUB_SHA}"
          docker push "$IMAGE:latest"
