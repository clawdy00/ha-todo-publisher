apiVersion: v1
kind: Secret
metadata:
  name: ha-todo-publisher-config
  namespace: ha-todo-publisher
type: Opaque
stringData:
  config.toml: |
    bind_addr = "0.0.0.0:8080"

    [todos.cars]
    write_token = "replace-with-generated-cars-write-secret"
    read_token = "replace-with-generated-cars-read-secret"
